{
  "schema": "cutepower.gate-matrix/v1",
  "states": [
    "analysis",
    "implementation",
    "review",
    "writeback"
  ],
  "actions": [
    "business_context_read",
    "runtime_discovery_read",
    "repo_write",
    "verification_write",
    "verification_read",
    "board_execute",
    "artifact_collect",
    "review_decision",
    "project_log_write",
    "project_current_update"
  ],
  "board_policy": {
    "board_actions": [
      "board_execute",
      "artifact_collect"
    ],
    "action_relationships": [
      {
        "action": "board_execute",
        "action_axis": "board_side",
        "paired_with": [
          "verification_read",
          "verification_write"
        ]
      },
      {
        "action": "artifact_collect",
        "action_axis": "board_side",
        "paired_with": [
          "verification_read"
        ]
      }
    ],
    "review_stage_constraints": {
      "allowed_board_actions": [
        "artifact_collect"
      ],
      "forbidden_board_actions": [
        "board_execute"
      ],
      "allowed_roles": [
        "repo-reviewer",
        "functional-reviewer"
      ],
      "purpose": "evidence_collection_only",
      "forbidden_responsibilities": [
        "implementation",
        "deployment",
        "tuning",
        "rerun_ownership"
      ]
    }
  },
  "rules": [
    {
      "state": "analysis",
      "allow": [
        "business_context_read",
        "runtime_discovery_read",
        "project_log_write",
        "verification_read",
        "board_execute",
        "artifact_collect"
      ],
      "deny": [
        "repo_write",
        "verification_write",
        "review_decision",
        "project_current_update"
      ]
    },
    {
      "state": "implementation",
      "allow": [
        "business_context_read",
        "runtime_discovery_read",
        "repo_write",
        "verification_write",
        "verification_read",
        "board_execute",
        "artifact_collect",
        "project_log_write"
      ],
      "deny": [
        "review_decision",
        "project_current_update"
      ]
    },
    {
      "state": "review",
      "allow": [
        "business_context_read",
        "runtime_discovery_read",
        "review_decision",
        "verification_read",
        "artifact_collect",
        "project_log_write"
      ],
      "deny": [
        "repo_write",
        "verification_write",
        "board_execute",
        "project_current_update"
      ]
    },
    {
      "state": "writeback",
      "allow": [
        "project_log_write",
        "project_current_update"
      ],
      "deny": [
        "business_context_read",
        "runtime_discovery_read",
        "repo_write",
        "verification_write",
        "review_decision",
        "board_execute",
        "artifact_collect"
      ]
    }
  ]
}
