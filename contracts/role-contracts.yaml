{
  "schema": "cutepower.role-contracts/v1",
  "role_aliases": [
    {
      "legacy_role_id": "reviewer",
      "canonical_role_id": "repo-reviewer",
      "status": "legacy_alias_only"
    }
  ],
  "roles": [
    {
      "role_id": "workflow-orchestrator",
      "allowed_actions": [
        "runtime_discovery_read",
        "verification_read",
        "project_log_write",
        "project_current_update"
      ],
      "required_inputs": [
        "task_goal",
        "primary_type",
        "task_modifiers",
        "allowed_paths",
        "verification_tier"
      ],
      "required_outputs": [
        "roles_invoked",
        "state_transitions",
        "audit_summary"
      ],
      "stop_conditions": [
        "missing_allowed_paths",
        "missing_primary_type"
      ]
    },
    {
      "role_id": "scope-planner",
      "allowed_actions": [
        "business_context_read",
        "runtime_discovery_read",
        "verification_read",
        "project_log_write"
      ],
      "required_inputs": [
        "task_goal",
        "allowed_paths"
      ],
      "required_outputs": [
        "implementation_plan",
        "verification_plan",
        "open_uncertainties"
      ],
      "stop_conditions": [
        "insufficient_scope"
      ]
    },
    {
      "role_id": "repo-coder",
      "allowed_actions": [
        "business_context_read",
        "runtime_discovery_read",
        "repo_write",
        "verification_write",
        "verification_read",
        "project_log_write"
      ],
      "required_inputs": [
        "repo_scope",
        "implementation_plan"
      ],
      "required_outputs": [
        "change_summary",
        "verification_result"
      ],
      "stop_conditions": [
        "scope_conflict",
        "missing_repo_scope"
      ]
    },
    {
      "role_id": "repo-reviewer",
      "allowed_actions": [
        "business_context_read",
        "runtime_discovery_read",
        "review_decision",
        "verification_read",
        "artifact_collect",
        "project_log_write"
      ],
      "required_inputs": [
        "task_goal",
        "implementation_plan",
        "diff_summary",
        "verification_results",
        "verification_tier",
        "necessary_code_context"
      ],
      "required_outputs": [
        "review_findings",
        "review_decision",
        "regression_risk_assessment",
        "scope_compliance_assessment"
      ],
      "stop_conditions": [
        "missing_review_package",
        "missing_procedural_review_stage",
        "missing_required_evidence"
      ]
    },
    {
      "role_id": "functional-reviewer",
      "allowed_actions": [
        "business_context_read",
        "runtime_discovery_read",
        "review_decision",
        "verification_read",
        "artifact_collect",
        "project_log_write"
      ],
      "required_inputs": [
        "requirements_package",
        "acceptance_items",
        "interface_contracts",
        "evidence_package"
      ],
      "required_outputs": [
        "compliance_matrix",
        "evidence_used",
        "evidence_gaps",
        "review_conclusion",
        "suggested_followup"
      ],
      "stop_conditions": [
        "missing_requirements_package",
        "missing_acceptance_items",
        "evidence_insufficient_for_decision",
        "missing_procedural_review_stage"
      ]
    },
    {
      "role_id": "board-operator",
      "allowed_actions": [
        "runtime_discovery_read",
        "board_execute",
        "artifact_collect",
        "verification_read",
        "verification_write",
        "project_log_write"
      ],
      "required_inputs": [
        "board_target",
        "deploy_artifacts",
        "run_commands",
        "collect_paths",
        "expected_signals"
      ],
      "required_outputs": [
        "board_run_report",
        "artifact_manifest",
        "signal_observations",
        "execution_status",
        "board_failure_reason",
        "environment_fingerprint"
      ],
      "stop_conditions": [
        "missing_board_target",
        "missing_run_commands",
        "invalid_collect_paths"
      ]
    },
    {
      "role_id": "incident-investigator",
      "allowed_actions": [
        "business_context_read",
        "runtime_discovery_read",
        "verification_read",
        "board_execute",
        "artifact_collect",
        "project_log_write"
      ],
      "required_inputs": [
        "observed_symptoms",
        "artifact_inventory",
        "log_sources",
        "trigger_condition",
        "board_target_or_no_board_execution",
        "repo_scope",
        "verification_tier"
      ],
      "required_outputs": [
        "hypothesis_set",
        "evidence_gaps",
        "probe_plan",
        "rerun_summary",
        "route_decision",
        "next_required_skill"
      ],
      "stop_conditions": [
        "missing_initial_evidence",
        "missing_route_decision",
        "unresolved_probe_scope"
      ]
    }
  ]
}
